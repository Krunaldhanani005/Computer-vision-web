{% extends "base.html" %}
{% block title %}FR Report Dashboard — CV Platform{% endblock %}

{% block extra_css %}
<style>
:root{--acc:#6366f1;--g:#22c55e;--o:#f97316;--r:#ef4444;--bg2:rgba(255,255,255,.04);--br:rgba(255,255,255,.08);}
.rp-wrap{padding:24px 28px;max-width:1400px;margin:0 auto;}
/* Top bar */
.rp-topbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
.rp-title{font-size:1.35rem;font-weight:800;flex:1;}
.rp-tabs{display:flex;gap:0;border:1px solid var(--br);border-radius:8px;overflow:hidden;}
.rp-tab{padding:8px 18px;font-size:.82rem;font-weight:600;cursor:pointer;color:#888;background:none;border:none;transition:.2s;}
.rp-tab.active{background:var(--acc);color:#fff;}
.rp-tab.t-g.active{background:var(--g);}
.rp-tab.t-o.active{background:var(--o);}
.rp-tab.t-r.active{background:var(--r);}
/* Stats row */
.rp-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:20px;}
.rp-stat{background:var(--bg2);border:1px solid var(--br);border-radius:10px;padding:14px 16px;}
.rp-stat-lbl{font-size:.72rem;color:#666;text-transform:uppercase;letter-spacing:.06em;}
.rp-stat-val{font-size:1.7rem;font-weight:800;margin-top:4px;}
.rp-stat-sub{font-size:.72rem;color:#555;margin-top:2px;}
/* Controls */
.rp-controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px;}
.rp-search{flex:1;min-width:200px;padding:9px 14px;background:var(--bg2);border:1px solid var(--br);color:#fff;border-radius:8px;outline:none;font-size:.85rem;}
.rp-search:focus{border-color:var(--acc);}
.rp-select{padding:9px 12px;background:var(--bg2);border:1px solid var(--br);color:#fff;border-radius:8px;outline:none;font-size:.82rem;cursor:pointer;}
.rp-btn{padding:9px 16px;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;border:1px solid var(--br);background:var(--bg2);color:#ccc;transition:.18s;white-space:nowrap;}
.rp-btn:hover{background:rgba(255,255,255,.1);}
.rp-btn.primary{background:var(--acc);border-color:var(--acc);color:#fff;}
.rp-btn.export{background:rgba(34,197,94,.1);border-color:var(--g);color:var(--g);}
/* Count badge */
.rp-count{background:rgba(99,102,241,.15);color:var(--acc);border:1px solid rgba(99,102,241,.3);border-radius:20px;padding:4px 12px;font-size:.78rem;font-weight:700;}
/* Grid */
.rp-grid{display:grid;gap:14px;}
.rp-grid.known-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));}
.rp-grid.alerts-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));}
/* Known card */
.kc{background:var(--bg2);border:1px solid var(--br);border-radius:12px;overflow:hidden;transition:.2s;}
.kc:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.5);border-color:rgba(255,255,255,.15);}
.kc-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#0a0a14;}
.kc-img-ph{width:100%;aspect-ratio:1;background:#111;display:flex;align-items:center;justify-content:center;font-size:2.8rem;color:#2a2a3a;}
.kc-body{padding:10px 12px;}
.kc-name{font-weight:700;font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.kc-id{font-size:.68rem;color:#555;margin-bottom:6px;font-family:monospace;}
.kc-att{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.kc-att-bar{flex:1;height:4px;background:#1a1a2e;border-radius:2px;overflow:hidden;}
.kc-att-fill{height:100%;background:var(--g);border-radius:2px;}
.kc-att-pct{font-size:.7rem;font-weight:700;color:var(--g);}
.kc-row{display:flex;justify-content:space-around;border-top:1px solid var(--br);padding-top:7px;margin-top:4px;}
.kc-stat{text-align:center;}
.kc-stat-v{font-size:.85rem;font-weight:700;}
.kc-stat-l{font-size:.6rem;color:#555;}
.kc-last{font-size:.65rem;color:#555;margin-top:6px;}
/* Unknown card */
.uc{background:var(--bg2);border:1px solid var(--br);border-radius:12px;overflow:hidden;transition:.2s;}
.uc:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.5);}
.uc-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#0a0a14;}
.uc-img-ph{width:100%;aspect-ratio:1;background:#111;display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:#2a2a3a;}
.uc-body{padding:8px 10px;}
.uc-id{font-size:.7rem;font-weight:700;font-family:monospace;color:var(--o);}
.uc-meta{font-size:.65rem;color:#555;line-height:1.5;margin-top:3px;}
.uc-badge{display:inline-block;background:rgba(249,115,22,.12);color:var(--o);border-radius:20px;font-size:.62rem;font-weight:700;padding:2px 8px;margin-top:4px;}
/* Alert card (dense gallery) */
.ac{background:#0a0a14;border-radius:8px;overflow:hidden;cursor:pointer;transition:.15s;border:1px solid transparent;}
.ac:hover{border-color:var(--r);transform:scale(1.03);}
.ac-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;}
.ac-img-ph{width:100%;aspect-ratio:1;background:#111;display:flex;align-items:center;justify-content:center;font-size:2rem;color:#2a2a3a;}
.ac-foot{padding:5px 6px;}
.ac-type{font-size:.6rem;color:var(--r);font-weight:700;}
.ac-time{font-size:.58rem;color:#555;}
.ac-name{font-size:.62rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* Pagination */
.rp-page{display:flex;align-items:center;gap:8px;justify-content:space-between;margin-top:22px;flex-wrap:wrap;}
.rp-page-info{font-size:.78rem;color:#666;}
.rp-page-btns{display:flex;gap:6px;}
.rp-page-btn{padding:6px 14px;border-radius:6px;font-size:.78rem;font-weight:600;cursor:pointer;border:1px solid var(--br);background:var(--bg2);color:#ccc;transition:.15s;}
.rp-page-btn:hover:not(:disabled){background:rgba(255,255,255,.1);}
.rp-page-btn.active{background:var(--acc);border-color:var(--acc);color:#fff;}
.rp-page-btn:disabled{opacity:.35;cursor:not-allowed;}
/* Empty state */
.rp-empty{grid-column:1/-1;padding:60px 20px;text-align:center;color:#444;}
.rp-empty-icon{font-size:3rem;display:block;margin-bottom:10px;}
/* Spinner */
.rp-spinner{grid-column:1/-1;padding:60px;text-align:center;color:#555;}
/* Present dot */
.present-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--g);margin-right:4px;vertical-align:middle;}
</style>
{% endblock %}

{% block content %}
<div class="rp-wrap">

  <!-- Top bar -->
  <div class="rp-topbar">
    <div>
      <div style="font-size:.72rem;color:#555;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;">Face Recognition</div>
      <div class="rp-title">&#9685; FR Report Dashboard</div>
    </div>
    <div class="rp-tabs">
      <button class="rp-tab t-g active" id="tab-known"     onclick="switchTab('known')">&#x2714; Known</button>
      <button class="rp-tab t-o"        id="tab-unknown"   onclick="switchTab('unknown')">&#x3F; Unknown</button>
      <button class="rp-tab t-r"        id="tab-blacklist" onclick="switchTab('blacklist')">&#x26A0; Blacklist</button>
    </div>
    <a href="/face-recognition" class="rp-btn" style="text-decoration:none;">&#x21B5; Live Monitor</a>
  </div>

  <!-- Stats -->
  <div class="rp-stats" id="rp-stats-row"></div>

  <!-- Controls -->
  <div class="rp-controls">
    <input  class="rp-search" id="rp-search" type="search" placeholder="Search..." oninput="onSearch()"/>
    <select class="rp-select" id="rp-sort" onchange="loadCurrent()">
      <option value="last_seen">Last Seen</option>
      <option value="name_asc">Name A→Z</option>
      <option value="name_desc">Name Z→A</option>
      <option value="detections">Most Detections</option>
    </select>
    <input  class="rp-select" id="rp-date" type="date" style="display:none;" onchange="loadCurrent()" title="Filter by date"/>
    <span   class="rp-count"  id="rp-count">—</span>
    <button class="rp-btn" onclick="loadCurrent()">&#x21BB; Refresh</button>
    <button class="rp-btn export" id="rp-export-btn" onclick="exportCSV()" style="display:none;">&#x2913; Export CSV</button>
    <button class="rp-btn" id="rp-delete-unk-btn" style="background:rgba(239,68,68,.1);border-color:var(--r);color:var(--r);display:none;" onclick="deleteAllUnknown()">&#x1F5D1; Delete All Unknown Images</button>
  </div>

  <!-- Grid -->
  <div class="rp-grid known-grid" id="rp-grid">
    <div class="rp-spinner">&#9696; Loading…</div>
  </div>

  <!-- Pagination -->
  <div class="rp-page" id="rp-pagination" style="display:none;">
    <div class="rp-page-info" id="rp-page-info"></div>
    <div class="rp-page-btns" id="rp-page-btns"></div>
  </div>

</div>
{% endblock %}

{% block extra_scripts %}
<script>
// ── State ────────────────────────────────────────────────────────────────────
let _tab       = 'known';
let _page      = 1;
let _total     = 0;
let _perPage   = 24;
let _search    = '';
let _searchTimer = null;

// ── Tab switch ───────────────────────────────────────────────────────────────
function switchTab(t) {
  _tab = t; _page = 1;
  document.querySelectorAll('.rp-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');

  const grid = document.getElementById('rp-grid');
  if (t === 'known') {
    grid.className = 'rp-grid known-grid';
    _perPage = 24;
    document.getElementById('rp-sort').style.display = '';
    document.getElementById('rp-date').style.display = 'none';
    document.getElementById('rp-export-btn').style.display = '';
    document.getElementById('rp-delete-unk-btn').style.display = 'none';
  } else if (t === 'unknown') {
    grid.className = 'rp-grid known-grid';
    _perPage = 50;
    document.getElementById('rp-sort').style.display = '';
    document.getElementById('rp-date').style.display = 'none';
    document.getElementById('rp-export-btn').style.display = 'none';
    document.getElementById('rp-delete-unk-btn').style.display = '';
  } else {
    grid.className = 'rp-grid alerts-grid';
    _perPage = 50;
    document.getElementById('rp-sort').style.display = 'none';
    document.getElementById('rp-date').style.display = '';
    document.getElementById('rp-export-btn').style.display = '';
    document.getElementById('rp-delete-unk-btn').style.display = 'none';
  }
  loadCurrent();
  loadStats();
}

function onSearch() {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => { _page = 1; loadCurrent(); }, 400);
}

// ── Data loaders ─────────────────────────────────────────────────────────────
async function loadCurrent() {
  const search  = document.getElementById('rp-search').value.trim();
  const sort    = document.getElementById('rp-sort').value;
  const dateVal = document.getElementById('rp-date').value;

  let url = '';
  if (_tab === 'known')
    url = `/api/report/known?search=${encodeURIComponent(search)}&sort=${sort}&page=${_page}&per_page=${_perPage}`;
  else if (_tab === 'unknown')
    url = `/api/report/unknown?search=${encodeURIComponent(search)}&sort=${sort}&page=${_page}&per_page=${_perPage}`;
  else
    url = `/api/report/blacklist?search=${encodeURIComponent(search)}&date=${dateVal}&page=${_page}&per_page=${_perPage}`;

  document.getElementById('rp-grid').innerHTML = '<div class="rp-spinner">&#9696; Loading…</div>';

  try {
    const resp = await fetch(url);
    const json = await resp.json();
    _total = json.total;
    document.getElementById('rp-count').textContent = `${_total} record${_total !== 1 ? 's' : ''}`;
    renderGrid(json.data);
    renderPagination();
  } catch(e) {
    document.getElementById('rp-grid').innerHTML = '<div class="rp-empty"><span class="rp-empty-icon">⚠</span>Failed to load data.</div>';
  }
}

async function loadStats() {
  let url = _tab === 'known' ? '/api/report/known/stats'
           : _tab === 'unknown' ? '/api/report/unknown/stats'
           : '/api/report/blacklist/stats';
  try {
    const resp = await fetch(url);
    const s    = await resp.json();
    renderStats(s);
  } catch(e) {}
}

// ── Render Stats ─────────────────────────────────────────────────────────────
function renderStats(s) {
  const row = document.getElementById('rp-stats-row');
  let html  = '';

  if (_tab === 'known') {
    html = `
      <div class="rp-stat"><div class="rp-stat-lbl">Registered Faces</div><div class="rp-stat-val" style="color:var(--g)">${s.registered_faces||0}</div><div class="rp-stat-sub">Total identities</div></div>
      <div class="rp-stat"><div class="rp-stat-lbl">Recognised Today</div><div class="rp-stat-val" style="color:var(--acc)">${s.recognized_today||0}</div><div class="rp-stat-sub">Unique persons seen</div></div>
      <div class="rp-stat"><div class="rp-stat-lbl">Avg Attendance</div><div class="rp-stat-val" style="color:var(--o)">${s.avg_attendance||0}%</div><div class="rp-stat-sub">Across all persons</div></div>`;
  } else if (_tab === 'unknown') {
    html = `
      <div class="rp-stat"><div class="rp-stat-lbl">Total Unknown</div><div class="rp-stat-val" style="color:var(--o)">${s.total_unknown||0}</div><div class="rp-stat-sub">Unique unknowns captured</div></div>
      <div class="rp-stat"><div class="rp-stat-lbl">Unknown Today</div><div class="rp-stat-val" style="color:var(--r)">${s.unknown_today||0}</div><div class="rp-stat-sub">First seen today</div></div>`;
  } else {
    html = `
      <div class="rp-stat"><div class="rp-stat-lbl">Total Alerts</div><div class="rp-stat-val" style="color:var(--r)">${s.total_alerts||0}</div><div class="rp-stat-sub">All blacklist events</div></div>
      <div class="rp-stat"><div class="rp-stat-lbl">Alerts Today</div><div class="rp-stat-val" style="color:var(--o)">${s.alerts_today||0}</div><div class="rp-stat-sub">Triggered since midnight</div></div>
      <div class="rp-stat"><div class="rp-stat-lbl">Unique Persons</div><div class="rp-stat-val" style="color:var(--acc)">${s.unique_persons||0}</div><div class="rp-stat-sub">Distinct blacklist names</div></div>`;
  }
  row.innerHTML = html;
}

// ── Render grid ───────────────────────────────────────────────────────────────
function renderGrid(data) {
  const grid = document.getElementById('rp-grid');
  if (!data || data.length === 0) {
    grid.innerHTML = `<div class="rp-empty"><span class="rp-empty-icon">${_tab==='blacklist'?'🚨':_tab==='unknown'?'🕵':'👤'}</span>No records found.</div>`;
    return;
  }
  if (_tab === 'known')      grid.innerHTML = data.map(knownCard).join('');
  else if (_tab === 'unknown') grid.innerHTML = data.map(unknownCard).join('');
  else                       grid.innerHTML = data.map(alertCard).join('');
}

// ── Card builders ─────────────────────────────────────────────────────────────
function imgSrc(path) {
  if (!path) return null;
  // path is like "static/fr_reports/file.jpg" → "/static/fr_reports/file.jpg"
  return '/' + path;
}

function knownCard(d) {
  const snap = d.latest_snapshot ? imgSrc(d.latest_snapshot) : null;
  const img  = snap
    ? `<img class="kc-img" src="${snap}" alt="${d.name}" onerror="this.outerHTML='<div class=\\'kc-img-ph\\'>👤</div>'">`
    : `<div class="kc-img-ph">👤</div>`;
  const pct  = d.attendance_pct || 0;
  const dot  = d.is_present_today ? '<span class="present-dot"></span>' : '';
  const first = d.first_seen || '—';
  const last  = d.last_seen || '—';
  return `
<div class="kc">
  ${img}
  <div class="kc-body">
    <div class="kc-name" title="${d.name}">${d.name||'—'}</div>
    <div class="kc-id" style="color:var(--g);font-weight:700;">Detected: ${d.total_detections||0} times</div>
    <div class="kc-meta" style="font-size:.65rem;color:#666;line-height:1.5;margin-top:6px;">
      <div style="margin-bottom:2px;">First Seen: <span style="color:#aaa;">${first}</span></div>
      <div>Last Seen: ${dot}<span style="color:#aaa;">${last}</span></div>
    </div>
  </div>
</div>`;
}

function unknownCard(d) {
  const snap = d.latest_snapshot ? imgSrc(d.latest_snapshot) : null;
  const img  = snap
    ? `<img class="uc-img" src="${snap}" alt="unknown" onerror="this.outerHTML='<div class=\\'uc-img-ph\\'>🕵</div>'">`
    : `<div class="uc-img-ph">🕵</div>`;
  return `
<div class="uc">
  ${img}
  <div class="uc-body">
    <div class="uc-id" style="color:#aaa;font-weight:normal;margin-bottom:6px;">UNKNOWN FACE</div>
    <div class="uc-meta" style="font-size:.7rem;color:#666;line-height:1.6;">
      Date: <span style="color:#fff;font-weight:600;">${d.date||'—'}</span><br>
      Time: <span style="color:#fff;font-weight:600;">${d.time||'—'}</span>
    </div>
  </div>
</div>`;
}

function alertCard(d) {
  const snap = d.snapshot ? imgSrc(d.snapshot) : null;
  const img  = snap
    ? `<img class="ac-img" src="${snap}" alt="${d.name}" onerror="this.outerHTML='<div class=\\'ac-img-ph\\'>🚨</div>'">`
    : `<div class="ac-img-ph">🚨</div>`;
  const t = (d.alert_time||'').substring(0,16).replace('T',' ');
  return `
<div class="ac" title="${d.name} — ${t}">
  ${img}
  <div class="ac-foot">
    <div class="ac-type">⚠ Face Detection</div>
    <div class="ac-name">${d.name||'—'}</div>
    <div class="ac-time">${t}</div>
  </div>
</div>`;
}

// ── Pagination ────────────────────────────────────────────────────────────────
function renderPagination() {
  const totalPages = Math.ceil(_total / _perPage);
  const pg = document.getElementById('rp-pagination');
  const info = document.getElementById('rp-page-info');
  const btns = document.getElementById('rp-page-btns');

  if (totalPages <= 1) { pg.style.display = 'none'; return; }
  pg.style.display = 'flex';

  const start = (_page - 1) * _perPage + 1;
  const end   = Math.min(_page * _perPage, _total);
  info.textContent = `Showing ${start}–${end} of ${_total} results`;

  let html = `<button class="rp-page-btn" onclick="goPage(${_page-1})" ${_page===1?'disabled':''}>‹ Prev</button>`;
  const maxBtns = 5;
  let startP = Math.max(1, _page - 2);
  let endP   = Math.min(totalPages, startP + maxBtns - 1);
  if (endP - startP < maxBtns - 1) startP = Math.max(1, endP - maxBtns + 1);
  for (let p = startP; p <= endP; p++) {
    html += `<button class="rp-page-btn ${p===_page?'active':''}" onclick="goPage(${p})">${p}</button>`;
  }
  html += `<button class="rp-page-btn" onclick="goPage(${_page+1})" ${_page===totalPages?'disabled':''}>Next ›</button>`;
  btns.innerHTML = html;
}

function goPage(p) {
  if (p < 1 || p > Math.ceil(_total / _perPage)) return;
  _page = p;
  loadCurrent();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── Export ────────────────────────────────────────────────────────────────────
function exportCSV() {
  const url = _tab === 'known' ? '/api/report/export/known' : '/api/report/export/blacklist';
  window.location.href = url;
}

// ── Delete Unknown ────────────────────────────────────────────────────────────
async function deleteAllUnknown() {
  if (!confirm('Are you sure you want to delete ALL unknown face images and records? This action cannot be undone.')) {
    return;
  }
  try {
    const res = await fetch('/api/report/unknown/delete_all', { method: 'POST' });
    const json = await res.json();
    if (json.success) {
      alert('All unknown records and images deleted successfully.');
      _page = 1;
      loadCurrent();
      loadStats();
    } else {
      alert('Error deleting unknown records.');
    }
  } catch(e) {
    alert('Server error while deleting unknown records.');
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  switchTab('known');
});
</script>
{% endblock %}
